<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Screen</title>
    <link rel="stylesheet" href="title.css">
</head>
<body>
    <audio src="assets/sfx/hover2.wav" class="hover-sfx"></audio>
    <audio src="assets/sfx/open.wav" class="open-sfx"></audio>
    <audio src="assets/sfx/close.wav" class="close-sfx"></audio>
    <audio src="assets/bgm/start game.mp3" class="start-sfx"></audio>

    <section class="main">
        <h1 class="title">Donut Clicker</h1>
        <img src="assets/img/donuts/donut.svg" alt="title icon" srcset="" class="icon" draggable="true">
        <div class="buttons">
            <button onmouseenter="btnHover()" class="btn-new" onclick="newGame()"><b>New Game</b></button>
            <button onmouseenter="btnHover()" class="btn-load" onclick="openLoad()"><b>Load Game</b></button>
            <button onmouseenter="btnHover()" class="btn-sett" onclick="openSettings()"><b>Settings</b></button>
            <button onmouseenter="btnHover()" class="btn-quit" onclick="quit()"><b>Quit</b></button>
        </div>
    </section>



    <section id="loadBox" class="menu-box">
        <div class="btn-load menu-box-color">
            <div class="load-arrange">
                <div class="save disabled">
                    <img src="assets/img/donuts/donut.svg" alt="save icon" srcset="" class="save-img">
                    <img src="assets/img/ui/die1.svg" alt="prestige icon" srcset="" class="save-prestige">
                    <div class="save-stat">
                        <p class="save-name">Slot 0</p>
                        <p>Donut #<span class="save-donut">152</span></p>
                        <p>Achievements: <span class="save-achievements">59</span>/213</p>
                    </div>
                    <div class="save-time">
                        <p>Progress: <span class="save-progress">100</span>%</p>
                        <p>P Time - <span class="save-time-p">00:02:17:56.08</span></p>
                        <p>G Time - <span class="save-time-g">00:11:39:12.43</span></p>
                    </div>
                </div>
            </div>
            <button class="menu-return btn-load" onclick="closeMenu()"><b>Back</b></button>
        </div>
    </section>

    <section id="settBox" class="menu-box">
        <div class="btn-sett menu-box-color">
            <div class="sett-arrange">
                <h1>Settings:</h1>
                <p>1</p>
                <p>2</p>
            </div>
            <button class="menu-return btn-sett" onclick="closeMenu()"><b>Back</b></button>
        </div>
    </section>



    <script src="title.js"></script>
</body>
</html>
